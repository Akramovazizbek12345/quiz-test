 <html>

		 <link rel="stylesheet" href="css/style.css">

		 <body>
			 <div class="container">
				 <h1>Quiz Website</h1>
				  <div class="tabs">

						 <button onclick="showRegister()">Sign Up</button>
						 </div>

								 </form>
								</div> 
								<script src="js/script.js"></script>
