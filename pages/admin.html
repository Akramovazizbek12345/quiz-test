<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<link rel="stylesheet" href="../css/admin.css">
</head>
<body>

<div class="dashboard">

<h1>Admin Dashboard</h1>

<!-- Site Statistics -->
<div class="card">
<h2>Site Statistics</h2>
<p>Total visitors: <span id="total-visitors">0</span></p>
</div>

<!-- Add Question -->
<div class="card">
<h2>Add Question</h2>
<input id="question" placeholder="Question">
<input id="o1" placeholder="Option 1">
<input id="o2" placeholder="Option 2">
<input id="o3" placeholder="Option 3">
<input id="o4" placeholder="Option 4">
<input id="correct" placeholder="Correct option (1-4)">
<button onclick="addQuestion()">Add Question</button>
</div>

<!-- Questions Table -->
<div class="card">
<h2>Questions</h2>
<table>
<tr>
<th>Question</th>
<th>Actions</th>
</tr>
<tbody id="questionsTable"></tbody>
</table>
</div>

<!-- Leaderboard -->
<div class="card">
<h2>Leaderboard</h2>
<table>
<tr>
<th>Rank</th>
<th>User</th>
<th>Score</th>
<th>Delete</th>
</tr>
<tbody id="leaderboard"></tbody>
</table>
</div>

<script src="../js/admin.js"></script>
</body>
</html>
